name: Publish to PyPI

# Triggered when release-please (or manual) creates a version tag.
# Requires RELEASE_PLEASE_TOKEN (PAT with repo scope) in release-please.yml —
# tags created by GITHUB_TOKEN do NOT trigger other workflows.
on:
  push:
    tags:
      - "v*"

# Least-privilege: read-only by default; publish jobs escalate per-job.
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  # ---------------------------------------------------------------------------
  # Build — produce sdist + wheel, smoke test install, upload as artifact.
  # Note: quality-gate skipped for now — tests require CUDA hardware.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12

      - name: Build distributions
        run: uv build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag version ${TAG_VERSION} does not match pyproject.toml version ${TOML_VERSION}"
            exit 1
          fi
          echo "Version ${TAG_VERSION} matches — OK"

      - name: Verify wheel contents
        run: |
          uv venv /tmp/smoke --python 3.12
          SMOKE=/tmp/smoke/bin
          uv pip install --python "$SMOKE/python" dist/*.whl --no-deps
          "$SMOKE/python" -c "
          import importlib.metadata, pathlib
          m = importlib.metadata.metadata('turboquant-vllm')
          print(f'{m[\"Name\"]} {m[\"Version\"]} — metadata OK')
          # Verify key modules are in the wheel (no torch import needed)
          import turboquant_vllm.lloyd_max as lm
          print(f'lloyd_max module — OK')
          "
          echo "Wheel contents verified — OK"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to PyPI — production release.
  # Uses OIDC trusted publishing (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
